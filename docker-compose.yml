version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api

  api:
    build:
      context: .
      target: development
    ports:
      - "5000:5000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/viqiumai
      - MONGODB_URI=mongodb://mongodb:27017/viqiumai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # You can override credentials if you want to use the local instances
      - REDIS_USERNAME=default
      - REDIS_PASSWORD=
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
